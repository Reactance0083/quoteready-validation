<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">QuoteReady commercial submission readiness</title>
  <desc id="desc">QuoteReady wordmark and a short description of the synthetic commercial intake analyzer.</desc>
  <rect width="1200" height="630" fill="#f4f7fb"/>
  <rect x="72" y="72" width="1056" height="486" rx="28" fill="#fff" stroke="#d9e0ea" stroke-width="4"/>
