  <text x="178" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#fff">QR</text>
  <text x="260" y="194" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#17202f">QuoteReady</text>
  <text x="130" y="300" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#17202f">Commercial intake readiness,</text>
